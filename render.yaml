services:
  - type: web
    name: guias-flete-chile
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:web && npm run build:server
    startCommand: node dist-server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: guias-flete-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_BUSINESS
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_URL
        value: https://guias-flete-chile.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://guias-flete-chile.onrender.com

databases:
  - name: guias-flete-db
    plan: free
    databaseName: guias_flete
    user: guias_admin
